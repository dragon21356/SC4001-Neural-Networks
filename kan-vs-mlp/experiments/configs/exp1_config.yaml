# Experiment 1: KAN vs MLP Regression Benchmark on California Housing
#
# This experiment answers Research Question 1: Does KAN outperform MLP
# on low-dimensional regression where the Kolmogorov-Arnold theorem
# provides a theoretical advantage?

experiment_name: "exp1_regression"

# Dataset
dataset:
  name: "california_housing"
  batch_size: 64

# KAN hyperparameter grid to sweep
kan_grid_search:
  grid_sizes: [3, 5, 10, 20]
  spline_orders: [2, 3]
  hidden_dim: 64

# MLP configuration
# For each KAN config, we compute a parameter-matched MLP hidden dim.
# The MLP always uses the same architecture (3 Linear layers, 2 hidden layers of same width)
mlp:
  dropout: 0.1

# Training
training:
  epochs: 200
  learning_rate: 0.001
  optimizer: "adam"
  weight_decay: 0.0
  early_stopping_patience: 20
  scheduler: "reduce_on_plateau"
  scheduler_patience: 10
  scheduler_factor: 0.5

# Reproducibility
seeds: [42, 123, 456]

# Output
output_dir: "results/exp1"
checkpoint_dir: "results/exp1/checkpoints"
